{% extends 'base.html' %}
{% block title %}Вход — Almaly Kanban{% endblock %}

{% block body %}
<div class="login-page">

    <div class="lp-glow-ring">
        <div class="lp-form-wrap">

            <h1 class="lf-title">С возвращением</h1>
            <p class="lf-sub">Введите корпоративный email и пароль</p>

            <form method="POST" action="/login" class="lf-form">
                <div class="lf-field">
                    <label for="email">Email</label>
                    <div class="lf-input-box">
                        <svg class="lf-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-10 7L2 7"/>
                        </svg>
                        <input type="email" id="email" name="email"
                               placeholder="name@almaly.kz"
                               required autocomplete="username">
                    </div>
                </div>

                <div class="lf-field">
                    <label for="password">Пароль</label>
                    <div class="lf-input-box">
                        <svg class="lf-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="password" name="password"
                               placeholder="••••••••"
                               autocomplete="current-password">
                    </div>
                </div>

                <label class="lf-remember">
                    <input type="checkbox" name="remember">
                    <span class="lf-remember-box"></span>
                    <span class="lf-remember-label">Запомнить меня</span>
                </label>

                {% if error %}
                <div class="lf-error">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    {{ error }}
                </div>
                {% endif %}

                <button type="submit" class="lf-submit">
                    Войти
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

</div>
{% endblock %}
